<!doctype html><meta charset="utf-8"><title>Redirigiendo…</title><style>body{font-family:system-ui;display:grid;place-items:center;height:100vh;background:#f8f5ef;color:#17363a}</style><p>Comprobando la oferta y redirigiendo…</p><script>(async()=>{const id=new URLSearchParams(location.search).get('offer');if(!id)throw Error('Oferta no indicada');const d=await (await fetch('data/catalog/offers.json')).json();const o=d.offers.find(x=>x.id===id);if(!o||!/^https:\/\/[^/]*awin1\.com\//.test(o.affiliateUrl))throw Error('Oferta no válida');sessionStorage.setItem('ss-last-click',JSON.stringify({offer:id,at:new Date().toISOString()}));location.replace(o.affiliateUrl)})().catch(e=>document.body.innerHTML='<p>No se pudo abrir esta oferta. '+e.message+'</p>')</script>
